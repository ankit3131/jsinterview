<body>
    <script>
let arr = [1,2,2,2,3,2,3];
let duplicate = [];
let count = 0;
for(let i=0;i<arr.length;i++) {
    for(let j=0;j<arr.length;j++) {
       
if(arr[i] === arr[j])
{
  
    count++
    break;  
}

    }
    if(count > 1 && !duplicate.includes(arr[i])) {
     
 duplicate.push(arr[i])
 count = 0;
}

}
console.log(duplicate)
    </script>
